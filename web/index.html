<!DOCTYPE html>
<html lang="en" data-theme="ps5">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zftpd | File Explorer</title>
  <!-- CSRF_TOKEN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
/* ══ THEMES ═══════════════════════════════════════════════════════ */
:root,[data-theme="ps5"]{
  --bg:#080b10;--sf:#101520;--sf2:#171d28;--sf3:#1e2535;
  --bd:#1e2d40;--bd2:#273550;
  --ac:#2b8cff;--ac2:#00c2ff;--acR:43,140,255;
  --tx:#dce8f8;--tx2:#7a94b8;--tx3:#445a78;
  --ok:#2ecc71;--wn:#f0a500;--er:#ff5f57;
  --tg:rgba(43,140,255,.12);--tgb:rgba(43,140,255,.3);
  --tl:#2b8cff;--gw:rgba(43,140,255,.08);
}
[data-theme="matrix"]{
  --bg:#030804;--sf:#07100a;--sf2:#0b160d;--sf3:#101c12;
  --bd:#132a16;--bd2:#1c4022;
  --ac:#00e639;--ac2:#a8ff3e;--acR:0,230,57;
  --tx:#c8f5cc;--tx2:#56a060;--tx3:#2e6035;
  --ok:#00e639;--wn:#d4ff00;--er:#ff3333;
  --tg:rgba(0,230,57,.1);--tgb:rgba(0,230,57,.3);
  --tl:#00e639;--gw:rgba(0,230,57,.05);
}
[data-theme="sunset"]{
  --bg:#0c080f;--sf:#16101e;--sf2:#1e1528;--sf3:#261b32;
  --bd:#2e1f40;--bd2:#44285c;
  --ac:#ff6535;--ac2:#ff2d78;--acR:255,101,53;
  --tx:#f2e4ff;--tx2:#a87ac4;--tx3:#6e4a8c;
  --ok:#80ff44;--wn:#ffcc00;--er:#ff2d78;
  --tg:rgba(255,101,53,.12);--tgb:rgba(255,101,53,.3);
  --tl:#ff6535;--gw:rgba(255,101,53,.07);
}
[data-theme="arctic"]{
  --bg:#060a0d;--sf:#0b1218;--sf2:#101a22;--sf3:#16222e;
  --bd:#162232;--bd2:#1e3048;
  --ac:#00d4ff;--ac2:#00ffcc;--acR:0,212,255;
  --tx:#d4eef8;--tx2:#5aaccc;--tx3:#2e7090;
  --ok:#00ffcc;--wn:#ffee00;--er:#ff4466;
  --tg:rgba(0,212,255,.1);--tgb:rgba(0,212,255,.28);
  --tl:#00d4ff;--gw:rgba(0,212,255,.06);
}
[data-theme="neon"]{
  --bg:#07040e;--sf:#0e0a1c;--sf2:#150f26;--sf3:#1c1432;
  --bd:#241a40;--bd2:#352560;
  --ac:#c800ff;--ac2:#ff00cc;--acR:200,0,255;
  --tx:#eddeff;--tx2:#9a70cc;--tx3:#5e3d8a;
  --ok:#44ff88;--wn:#ffaa00;--er:#ff3344;
  --tg:rgba(200,0,255,.1);--tgb:rgba(200,0,255,.28);
  --tl:#c800ff;--gw:rgba(200,0,255,.06);
}
[data-theme="amber"]{
  --bg:#090700;--sf:#120e00;--sf2:#1a1400;--sf3:#221b00;
  --bd:#2e2200;--bd2:#453300;
  --ac:#ffb700;--ac2:#ff8c00;--acR:255,183,0;
  --tx:#fff4cc;--tx2:#c49a00;--tx3:#7a5e00;
  --ok:#88ff44;--wn:#ff8c00;--er:#ff4422;
  --tg:rgba(255,183,0,.12);--tgb:rgba(255,183,0,.3);
  --tl:#ffb700;--gw:rgba(255,183,0,.07);
}

/* ══ RESET ════════════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}
svg{display:inline-block;vertical-align:middle;flex-shrink:0}

/* ══ TOPBAR ═══════════════════════════════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;gap:10px;
  padding:0 20px;height:58px;
  background:var(--sf);
  border-bottom:1.5px solid var(--tl);
  box-shadow:0 2px 20px rgba(0,0,0,.45);
}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1}

.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-logo{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(43,140,255,.5))}
.brand-text{line-height:1}
.brand-title{
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  background:linear-gradient(90deg,var(--ac),var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;letter-spacing:-.01em;
}
.brand-sub{font-size:9px;color:var(--tx3);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}

.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ══ STATUS ═══════════════════════════════════════════════════════ */
.status-pill{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;
  padding:5px 11px;border-radius:999px;
  border:1px solid var(--bd2);background:var(--sf2);
  transition:color .2s;white-space:nowrap;
}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--tx3);transition:all .2s}
.status-ok .sdot{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.status-bad .sdot{background:var(--er);box-shadow:0 0 7px var(--er)}
.status-ok{color:var(--ok)}.status-bad{color:var(--er)}

/* ══ STATS ════════════════════════════════════════════════════════ */
.stats-w{
  display:flex;align-items:stretch;
  background:var(--sf2);border:1px solid var(--bd2);
  border-radius:10px;overflow:hidden;cursor:pointer;
  transition:border-color .15s;position:relative;
}
.stats-w:hover{border-color:var(--ac)}
.sc{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:5px 11px;border-right:1px solid var(--bd);min-width:55px}
.sc[data-k="disk"]{min-width:112px}
.sc[data-k="disk"] .sv{font-size:10px}
.sc:last-child{border-right:none}
.sl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.sv{font-size:11px;font-weight:700;color:var(--tx);line-height:1.2}
.sv.ok{color:var(--ok)}.sv.wn{color:var(--wn)}.sv.er{color:var(--er)}
.sc-donut{display:flex;align-items:center;justify-content:center;padding:5px 10px;border-right:1px solid var(--bd)}
.dw{position:relative;width:28px;height:28px}
.dw svg{transform:rotate(-90deg)}
.d-track{fill:none;stroke:var(--bd2);stroke-width:4.5}
.d-fill{fill:none;stroke-width:4.5;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
.d-ctr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--ac)}

.stats-panel{
  position:absolute;top:calc(100% + 10px);right:0;
  width:276px;background:var(--sf);border:1px solid var(--bd2);
  border-radius:14px;padding:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  display:none;z-index:500;animation:popIn .15s ease;
}
.stats-panel.show{display:block}
.sp-hd{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--ac);
  margin-bottom:14px;display:flex;align-items:center;gap:6px}
.sp-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sp-row.hi{box-shadow:inset 0 0 0 1px var(--ac);border-radius:10px;padding:4px 6px;margin-left:-6px;margin-right:-6px}
.sp-lb{font-size:10px;color:var(--tx2);white-space:nowrap;min-width:68px}
.sp-vl{font-size:11px;font-weight:700;color:var(--tx);margin-left:auto;white-space:nowrap}
.sp-bar{height:3px;flex:1;background:var(--bd);border-radius:999px;overflow:hidden;min-width:30px}
.sp-bf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .5s ease}
.sp-bf.hot{background:linear-gradient(90deg,var(--wn),#ff6600)}
.sp-bf.full{background:linear-gradient(90deg,var(--wn),var(--er))}
.sp-div{height:1px;background:var(--bd);margin:10px 0}

/* ══ THEME DROPDOWN ═══════════════════════════════════════════════ */
.theme-btn{
  display:flex;align-items:center;gap:7px;
  border:1px solid var(--bd2);background:var(--sf2);color:var(--tx2);
  border-radius:8px;padding:6px 11px;
  font-family:inherit;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.theme-btn:hover{border-color:var(--ac);color:var(--tx)}
.t-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2)}
.t-arr{transition:transform .15s;color:var(--tx3)}
.theme-btn.open .t-arr{transform:rotate(180deg)}

.theme-dd{
  position:absolute;top:calc(100% + 8px);right:0;
  min-width:210px;background:var(--sf);
  border:1px solid var(--bd2);border-radius:14px;
  padding:8px;box-shadow:0 24px 64px rgba(0,0,0,.7);
  display:none;z-index:600;animation:popIn .15s ease;
}
.theme-dd.show{display:block}
.td-hd{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;
  padding:4px 8px 8px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.td-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;cursor:pointer;
  color:var(--tx2);transition:all .1s;
}
.td-item:hover{background:var(--sf2);color:var(--tx)}
.td-item.active{background:var(--gw);color:var(--ac)}
.td-sw{width:26px;height:26px;border-radius:7px;flex-shrink:0;border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center}
.td-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.td-nm{font-weight:600;font-size:12px}
.td-ds{font-size:10px;color:var(--tx3)}
.td-ck{color:var(--ac);opacity:0;transition:opacity .1s;flex-shrink:0}
.td-item.active .td-ck{opacity:1}

/* ══ TOOLBAR ══════════════════════════════════════════════════════ */
.toolbar{
  display:flex;align-items:center;gap:6px;
  padding:8px 20px;background:var(--sf);
  border-bottom:1px solid var(--bd);flex-wrap:wrap;
}
.btn{
  display:flex;align-items:center;gap:5px;
  border:1px solid var(--bd2);background:var(--sf2);color:var(--tx2);
  border-radius:7px;padding:6px 11px;font-size:11px;font-family:inherit;font-weight:600;
  cursor:pointer;transition:border-color .15s,background .15s,color .15s,transform .1s;white-space:nowrap;
}
.btn:hover{border-color:var(--ac);background:var(--sf3);color:var(--tx)}
.btn:active{transform:translateY(1px)}
.vg{display:flex;align-items:center;border:1px solid var(--bd2);border-radius:7px;overflow:hidden}
.vg .vb{
  background:var(--sf2);color:var(--tx3);border:none;
  padding:6px 10px;cursor:pointer;
  transition:background .1s,color .1s;line-height:1;
  border-right:1px solid var(--bd);display:flex;align-items:center;justify-content:center;
}
.vg .vb:last-child{border-right:none}
.vg .vb:hover{background:var(--sf3);color:var(--tx)}
.vg .vb.active{background:var(--gw);color:var(--ac)}
.tb-sep{width:1px;height:22px;background:var(--bd);flex-shrink:0;margin:0 2px}
.spacer{flex:1;min-width:8px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-ico{position:absolute;left:9px;pointer-events:none;color:var(--tx3)}
.search{
  width:260px;max-width:48vw;
  border:1px solid var(--bd2);background:var(--bg);color:var(--tx);
  border-radius:7px;padding:6px 10px 6px 30px;font-size:11px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.search:focus{border-color:var(--ac)}
.search::placeholder{color:var(--tx3)}

/* ══ BREADCRUMB ═══════════════════════════════════════════════════ */
.breadcrumb{
  display:flex;align-items:center;gap:2px;
  padding:6px 20px;border-bottom:1px solid var(--bd);
  overflow-x:auto;scrollbar-width:none;background:var(--sf);
}
.breadcrumb::-webkit-scrollbar{display:none}
.crumb{
  display:flex;align-items:center;gap:5px;
  color:var(--tx3);font-size:11px;cursor:pointer;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  transition:color .1s,background .1s;
}
.crumb:hover{color:var(--tx);background:var(--sf2)}
.crumb.act{color:var(--ac);font-weight:600;background:var(--gw)}
.cr-sep{color:var(--bd2);font-size:11px;user-select:none;padding:0 1px}

/* ══ CONTENT ══════════════════════════════════════════════════════ */
.content{padding:14px 20px;min-height:calc(100vh - 180px)}
.fl-header{display:flex;align-items:center;margin-bottom:12px}
.fl-count{font-size:11px;color:var(--tx3)}
.fl-count b{color:var(--ac);font-weight:700}

/* File type icon wrappers */
.fi-wrap{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
}
/* Category colors */
.fi-dir    { color:#4da6ff }
.fi-code   { color:#f7c948 }
.fi-web    { color:#4fc3f7 }
.fi-style  { color:#f06292 }
.fi-data   { color:#81c784 }
.fi-doc    { color:#90caf9 }
.fi-img    { color:#ce93d8 }
.fi-video  { color:#ff8a65 }
.fi-audio  { color:#a5d6a7 }
.fi-arch   { color:#ffb74d }
.fi-script { color:#80cbc4 }
.fi-bin    { color:#ef9a9a }
.fi-db     { color:#80deea }
.fi-lock   { color:#ffe082 }
.fi-log    { color:#b0bec5 }
.fi-sheet  { color:#a5d6a7 }
.fi-slide  { color:#ffab40 }
.fi-generic{ color:var(--tx2) }

/* EXT + SIZE badges */
.xb{
  display:inline-flex;align-items:center;
  padding:1px 6px;border-radius:4px;
  font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  border:1px solid var(--tgb);background:var(--tg);color:var(--ac);
  white-space:nowrap;flex-shrink:0;line-height:1.7;
}
.sb{font-size:10px;color:var(--tx2);white-space:nowrap;flex-shrink:0;font-weight:500}
.db{font-size:10px;color:var(--tx3);white-space:nowrap;flex-shrink:0}

/* ══ GRID VIEW ════════════════════════════════════════════════════ */
.fl.vg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:9px}
.fl.vg-grid .card{
  display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:16px 12px 11px;
  border:1px solid var(--bd);background:var(--sf);
  border-radius:13px;cursor:pointer;text-align:center;
  transition:border-color .15s,background .15s,transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.fl.vg-grid .card::before{
  content:'';position:absolute;inset:0;opacity:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% -10%,rgba(var(--acR),.18),transparent 65%);
  transition:opacity .2s;
}
.fl.vg-grid .card:hover{
  border-color:var(--ac);background:var(--sf2);transform:translateY(-3px);
  box-shadow:0 10px 32px rgba(0,0,0,.4),0 0 0 1px rgba(var(--acR),.35);
}
.fl.vg-grid .card:hover::before{opacity:1}
.c-ico{
  width:50px;height:50px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  background:var(--gw);border:1px solid rgba(255,255,255,.06);
}
.c-name{font-size:12px;font-weight:600;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-meta{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;width:100%;min-height:18px}

/* ══ LIST VIEW ════════════════════════════════════════════════════ */
.fl.vg-list{display:flex;flex-direction:column;gap:3px}
.fl.vg-list .card{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  border:1px solid var(--bd);background:var(--sf);
  border-radius:9px;cursor:pointer;transition:border-color .12s,background .12s;
}
.fl.vg-list .card:hover{border-color:var(--ac);background:var(--sf2)}
.fl.vg-list .c-ico{width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:var(--gw);border:1px solid rgba(255,255,255,.05)}
.fl.vg-list .c-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ══ DETAILS VIEW ═════════════════════════════════════════════════ */
.fl.vg-details{display:block}
.dtbl{width:100%;border-collapse:collapse}
.dtbl thead th{
  text-align:left;font-size:10px;font-weight:600;
  color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;
  padding:8px 14px;border-bottom:1px solid var(--bd2);
  cursor:pointer;user-select:none;white-space:nowrap;
}
.dtbl thead th:hover{color:var(--ac)}
.sort-a{color:var(--ac);margin-left:3px;font-size:10px}
.dtbl tbody tr{border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.dtbl tbody tr:hover{background:var(--sf2)}
.dtbl tbody td{padding:9px 14px;font-size:12px;vertical-align:middle}
.t-ic{width:36px;text-align:center}.t-nm{font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-ex{width:72px}.t-sz{width:88px;color:var(--tx2);white-space:nowrap}
.t-dt{color:var(--tx2);white-space:nowrap;font-size:11px}.t-tp{width:76px;color:var(--tx3);font-size:11px;white-space:nowrap}

/* ══ STATES ═══════════════════════════════════════════════════════ */
.s-card{
  grid-column:1/-1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:52px 24px;
  border-radius:14px;border:1px solid var(--bd);background:var(--sf);
  color:var(--tx2);font-size:13px;
}
.s-ico{opacity:.4;color:var(--tx2)}
.s-err{border-color:rgba(255,95,87,.28);background:rgba(255,95,87,.05);color:#ffb0ab}
.s-err .s-ico{opacity:.9;color:#ff8080}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd2);border-top-color:var(--ac);animation:spin .7s linear infinite}

/* ══ CTX MENU ═════════════════════════════════════════════════════ */
.ctx{position:fixed;z-index:9999;background:var(--sf);border:1px solid var(--bd2);
  border-radius:12px;padding:6px;min-width:194px;
  box-shadow:0 20px 60px rgba(0,0,0,.75);display:none}
.ctx.on{display:block;animation:popIn .12s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:none}}
.ci{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--tx2);transition:background .1s,color .1s}
.ci:hover{background:var(--sf2);color:var(--tx)}
.ci.red:hover{background:rgba(255,95,87,.1);color:var(--er)}
.ci-i{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-l{flex:1}
.c-sec{padding:4px 10px 5px;font-size:9px;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:192px}
.c-sep{height:1px;background:var(--bd);margin:4px 0}

/* ══ DROP ═════════════════════════════════════════════════════════ */
.drop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(8,11,16,.82);backdrop-filter:blur(8px);z-index:300}
.drop.on{display:flex;animation:fadeIn .15s ease}
.drop-card{width:min(460px,88vw);text-align:center;border:2px dashed var(--ac);
  border-radius:20px;padding:32px 24px;background:var(--sf)}
.d-ico{margin-bottom:14px;opacity:.85;color:var(--ac)}
.d-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:6px}
.d-sub{color:var(--tx2);font-size:12px;margin-bottom:16px}
.d-bar{height:6px;border-radius:999px;background:var(--bd);overflow:hidden}
.d-bf{height:100%;width:0%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .1s ease}

/* ══ TOAST ════════════════════════════════════════════════════════ */
.toast{position:fixed;bottom:20px;right:20px;z-index:9000;
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;border-radius:10px;
  background:var(--sf);border:1px solid var(--bd2);
  font-size:11px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:notifIn .2s ease;max-width:300px}
.toast.ok{border-color:var(--ok);color:var(--ok)}
.toast.er{border-color:var(--er);color:var(--er)}
@keyframes notifIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>

/* Map extension → {svg, cls} */
function fileIcon(x){
  if(x.type==='directory') return {html:ICO.folder,cls:'fi-dir'};
  var e=extOf(x.name);
  var codeExts={js:1,mjs:1,cjs:1,ts:1,tsx:1,jsx:1,py:1,go:1,rs:1,c:1,cpp:1,h:1,hpp:1,java:1,rb:1,php:1,lua:1,r:1,swift:1,kt:1,cs:1,scala:1};
  var webExts={html:1,htm:1};
  var styleExts={css:1,scss:1,sass:1,less:1,styl:1};
  var dataExts={json:1,xml:1,yaml:1,yml:1,toml:1,ini:1,cfg:1,conf:1,env:1};
  var docExts={md:1,txt:1,rst:1,pdf:1};
  var imgExts={png:1,jpg:1,jpeg:1,gif:1,svg:1,webp:1,ico:1,bmp:1,tiff:1,avif:1};
  var vidExts={mp4:1,mkv:1,avi:1,mov:1,webm:1,flv:1,wmv:1,m4v:1};
  var audExts={mp3:1,wav:1,flac:1,ogg:1,m4a:1,aac:1,opus:1,wma:1};
  var archExts={zip:1,tar:1,gz:1,bz2:1,xz:1,rar:1,'7z':1,zst:1};
  var scriptExts={sh:1,bash:1,zsh:1,fish:1,ps1:1,bat:1,cmd:1};
  var binExts={exe:1,bin:1,deb:1,rpm:1,dmg:1,iso:1,app:1,apk:1};
  var dbExts={db:1,sql:1,sqlite:1,sqlite3:1,mdb:1};
  var keyExts={key:1,pem:1,cert:1,crt:1,p12:1,pfx:1};
  var logExts={log:1,lock:1};
  var sheetExts={csv:1,xlsx:1,xls:1,tsv:1,ods:1};
  var docxExts={doc:1,docx:1,rtf:1,odt:1};
  var slideExts={ppt:1,pptx:1,odp:1};

  if(codeExts[e])   return {html:ICO.code,   cls:'fi-code'};
  if(webExts[e])    return {html:ICO.web,    cls:'fi-web'};
  if(styleExts[e])  return {html:ICO.style,  cls:'fi-style'};
  if(dataExts[e])   return {html:ICO.data,   cls:'fi-data'};
  if(docExts[e])    return {html:ICO.doc,    cls:'fi-doc'};
  if(imgExts[e])    return {html:ICO.image,  cls:'fi-img'};
  if(vidExts[e])    return {html:ICO.video,  cls:'fi-video'};
  if(audExts[e])    return {html:ICO.audio,  cls:'fi-audio'};
  if(archExts[e])   return {html:ICO.archive,cls:'fi-arch'};
  if(scriptExts[e]) return {html:ICO.script, cls:'fi-script'};
  if(binExts[e])    return {html:ICO.binary, cls:'fi-bin'};
  if(dbExts[e])     return {html:ICO.db,     cls:'fi-db'};
  if(keyExts[e])    return {html:ICO.key,    cls:'fi-lock'};
  if(logExts[e])    return {html:ICO.log,    cls:'fi-log'};
  if(sheetExts[e])  return {html:ICO.sheet,  cls:'fi-sheet'};
  if(docxExts[e])   return {html:ICO.doc,    cls:'fi-doc'};
  if(slideExts[e])  return {html:ICO.slide,  cls:'fi-slide'};
  return {html:ICO.file,cls:'fi-generic'};
}

/* ── HELPERS ── */
function csrf(){var m=D.querySelector('meta[name="csrf-token"]');return m?m.content:''}
function norm(p){if(typeof p!=='string'||!p)return'/';if(p[0]!=='/')p='/'+p;if(p.length>1&&p[p.length-1]==='/')p=p.slice(0,-1);return p}
function parent(p){p=norm(p);if(p==='/')return null;var i=p.lastIndexOf('/');return i<=0?'/':p.slice(0,i)}
function join(n){return S.path==='/'?'/'+n:S.path+'/'+n}
function bytes(b){if(typeof b!=='number'||b<0)return'—';if(b===0)return'0 B';var u=['B','KB','MB','GB','TB'],i=Math.min(Math.floor(Math.log(b)/Math.log(1024)),4);return(b/Math.pow(1024,i)).toFixed(i>0?1:0)+' '+u[i]}
function relDate(ts){if(!ts)return'—';var d=new Date(ts*1000);if(isNaN(d.getTime()))return'—';var diff=Math.floor((Date.now()-d)/1000);if(diff<60)return'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';if(diff<604800)return Math.floor(diff/86400)+'d ago';return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'})}
function extOf(n){if(!n||typeof n!=='string')return'';var p=n.split('.');return p.length<2?'':p[p.length-1].toLowerCase()}

/* ── STATUS / TOAST ── */
function setStatus(t,ok){var x=$('status');if(!x)return;x.innerHTML='<span class="sdot"></span>'+t;x.className='status-pill '+(ok?'status-ok':'status-bad')}
var _nt=null;
function toast(m,t){var o=D.querySelector('.toast');if(o)o.remove();var el=D.createElement('div');el.className='toast '+(t||'');el.textContent=(t==='ok'?'✓ ':t==='er'?'✕ ':'')+m;D.body.appendChild(el);clearTimeout(_nt);_nt=setTimeout(function(){if(el.parentNode)el.remove()},3000)}

/* ── DROP ── */
var _dd=0;
function showDrop(t,p){if(typeof t==='string')$('d-sub').textContent=t;if(typeof p==='number')$('d-bf').style.width=Math.max(0,Math.min(100,p))+'%';$('drop').classList.add('on')}
function hideDrop(){$('drop').classList.remove('on');$('d-sub').textContent='Release files to start uploading';$('d-bf').style.width='0%'}

/* ── BREADCRUMB ── */
function renderBC(){
  var b=$('breadcrumb');if(!b)return;b.innerHTML='';
  var root=D.createElement('span');root.className='crumb'+(S.path==='/'?' act':'');
  root.innerHTML=ICO.home+' Root';
  root.onclick=function(){nav('/')};b.appendChild(root);
  var parts=norm(S.path).split('/'),acc='';
  for(var i=0;i<parts.length;i++){var p=parts[i];if(!p)continue;acc+='/'+p;
    var sep=D.createElement('span');sep.className='cr-sep';sep.textContent='/';b.appendChild(sep);
    var seg=D.createElement('span');seg.className='crumb'+(acc===S.path?' act':'');seg.textContent=p;
    (function(cp){seg.onclick=function(){nav(cp)}}(acc));b.appendChild(seg);
  }
}

/* ── RENDER LIST ── */
function render(q){
  var fl=$('file-list');if(!fl)return;
  fl.className='fl vg-'+S.view;fl.innerHTML='';
  var qr=(typeof q==='string')?q.trim().toLowerCase():'';
  var en=S.entries||[];
  if(!en.length){fl.appendChild(stateCard('empty','Empty directory',false));updCount(0,0);return}
  var vis=en.filter(function(x){
    var nm=(typeof x.name==='string')?x.name:String(x.name==null?'':x.name);
    return!qr||nm.toLowerCase().indexOf(qr)>=0
  });
  if(!vis.length){fl.appendChild(stateCard('search','No results for "'+qr+'"',false));updCount(0,en.length);return}
  vis.sort(function(a,b){
    var ad=(a.type==='directory')?0:1,bd=(b.type==='directory')?0:1;
    if(ad!==bd)return ad-bd;
    var av=a[S.sort],bv=b[S.sort];
    var an=(typeof av==='number'),bn=(typeof bv==='number');
    if(an&&bn){
      var cn=av-bv;return S.sortAsc?cn:-cn;
    }
    av=(typeof av==='string')?av:String(av==null?'':av);
    bv=(typeof bv==='string')?bv:String(bv==null?'':bv);
    av=av.toLowerCase();bv=bv.toLowerCase();
    var c=(av<bv)?-1:(av>bv)?1:0;return S.sortAsc?c:-c;
  });
  updCount(vis.length,en.length);
  if(S.view==='details'){renderDetails(fl,vis)}else{vis.forEach(function(x){fl.appendChild(buildCard(x))})}
}

function stateCard(type,msg,isErr){
  var el=D.createElement('div');el.className='s-card'+(isErr?' s-err':'');
  var icoDiv=D.createElement('div');icoDiv.className='s-ico';
  if(type==='empty'){icoDiv.innerHTML='<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'}
  else if(type==='search'){icoDiv.innerHTML='<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'}
  else{icoDiv.innerHTML='<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'}
  var txt=D.createElement('div');txt.textContent=msg;
  el.appendChild(icoDiv);el.appendChild(txt);return el;
}

function updCount(v,t){
  var el=$('fl-cnt');if(!el)return;
  if(t===0){el.textContent='';return}
  el.innerHTML='Showing <b>'+v+'</b> of <b>'+t+'</b> items';
  var sf=$('s-files');if(sf)sf.textContent=String(t);
  var spf=$('sp-fi');if(spf)spf.textContent=String(t);
}

function buildCard(x){
  var isDir=(x.type==='directory'),path=join(x.name),ex=isDir?'':extOf(x.name);
  var fi=fileIcon(x);
  var c=D.createElement('div');c.className='card';

  var ico=D.createElement('div');ico.className='c-ico '+fi.cls;ico.innerHTML=fi.html;
  var nm=D.createElement('div');nm.className='c-name';nm.title=x.name;nm.textContent=x.name;

  if(S.view==='grid'){
    var meta=D.createElement('div');meta.className='c-meta';
    if(!isDir&&ex){var eb=D.createElement('span');eb.className='xb';eb.textContent=ex;meta.appendChild(eb)}
    var sb=D.createElement('span');sb.className='sb';sb.textContent=isDir?'Folder':bytes(x.size);meta.appendChild(sb);
    c.appendChild(ico);c.appendChild(nm);c.appendChild(meta);
  } else {
    var right=D.createElement('div');right.className='c-right';
    if(!isDir&&ex){var eb2=D.createElement('span');eb2.className='xb';eb2.textContent=ex;right.appendChild(eb2)}
    var sb2=D.createElement('span');sb2.className='sb';sb2.textContent=isDir?'Folder':bytes(x.size);right.appendChild(sb2);
    if(x.modified){var db=D.createElement('span');db.className='db';db.textContent=relDate(x.modified);right.appendChild(db)}
    c.appendChild(ico);c.appendChild(nm);c.appendChild(right);
  }
  (function(entry,p,dir){
    c.onclick=function(){dir?nav(p):(location.href='/api/download?path='+E(p))};
    c.oncontextmenu=function(ev){ev.preventDefault();showCtx(ev,entry,p,dir)};
  }(x,path,isDir));
  return c;
}

function renderDetails(fl,items){
  var tbl=D.createElement('table');tbl.className='dtbl';
  var thead=D.createElement('thead'),hr=D.createElement('tr');
  [{l:'',k:'',s:0,cls:'t-ic'},{l:'Name',k:'name',s:1,cls:'t-nm'},{l:'Ext',k:'',s:0,cls:'t-ex'},
   {l:'Size',k:'size',s:1,cls:'t-sz'},{l:'Type',k:'type',s:1,cls:'t-tp'},{l:'Modified',k:'modified',s:1,cls:'t-dt'}
  ].forEach(function(col){
    var th=D.createElement('th');th.className=col.cls||'';
    th.innerHTML=col.l+(col.s&&col.k&&S.sort===col.k?'<span class="sort-a">'+(S.sortAsc?'▲':'▼')+'</span>':'');
    if(col.s&&col.k){(function(k){th.onclick=function(){S.sort===k?S.sortAsc=!S.sortAsc:(S.sort=k,S.sortAsc=true);render($('search').value)}}(col.k))}
    hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=D.createElement('tbody');
  items.forEach(function(x){
    var isDir=(x.type==='directory'),path=join(x.name),ex=isDir?'':extOf(x.name);
    var fi=fileIcon(x);
    var tr=D.createElement('tr');
    var tdIc=D.createElement('td');tdIc.className='t-ic';
    var iw=D.createElement('div');iw.className='fi-wrap '+fi.cls;iw.style.width='24px';iw.style.height='24px';iw.innerHTML=fi.html;
    tdIc.appendChild(iw);
    var tdNm=D.createElement('td');tdNm.className='t-nm';tdNm.textContent=x.name;
    var tdEx=D.createElement('td');tdEx.className='t-ex';
    if(ex){var eb=D.createElement('span');eb.className='xb';eb.textContent=ex;tdEx.appendChild(eb)}
    var tdSz=D.createElement('td');tdSz.className='t-sz';tdSz.textContent=isDir?'—':bytes(x.size);
    var tdTp=D.createElement('td');tdTp.className='t-tp';tdTp.textContent=isDir?'Folder':(ex.toUpperCase()||'File');
    var tdDt=D.createElement('td');tdDt.className='t-dt';tdDt.textContent=relDate(x.modified);
    tr.appendChild(tdIc);tr.appendChild(tdNm);tr.appendChild(tdEx);tr.appendChild(tdSz);tr.appendChild(tdTp);tr.appendChild(tdDt);
    (function(entry,p,dir){
      tr.onclick=function(){dir?nav(p):(location.href='/api/download?path='+E(p))};
      tr.oncontextmenu=function(ev){ev.preventDefault();showCtx(ev,entry,p,dir)};
    }(x,path,isDir));
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);fl.appendChild(tbl);
}

/* ── NAVIGATE ── */
function nav(path){
  if(typeof path!=='string')return;
  var prev=S.path,next=norm(path);
  var fl=$('file-list');
  if(fl){fl.className='fl vg-'+S.view;fl.innerHTML='<div class="s-card"><div class="loader"></div><div>Loading\u2026</div></div>'}
  var fc=$('fl-cnt');if(fc)fc.textContent='';
  fetch('/api/list?path='+E(next))
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
    .then(function(d){
      S.path=next;
      var cp=$('current-path');if(cp)cp.textContent=S.path;
      var spt=$('sp-pt');if(spt)spt.textContent=S.path;
      S.entries=(d&&Array.isArray(d.entries))?d.entries:[];
      renderBC();render($('search').value);setStatus('Connected',true);refreshStats()
    })
    .catch(function(e){
      if(e&&e.message==='HTTP 403'){toast('Directory bloccata per sicurezza','wn');setStatus('Connected',true);nav(prev);return}
      var fl2=$('file-list');if(fl2){fl2.innerHTML='';fl2.appendChild(stateCard('error','Failed to load directory',true))}
      setStatus('Error',false);toast('Load failed: '+e.message,'er')
    });
}

/* ── UPLOAD ── */
function upload(files){
  if(!files||!files.length)return;
  var arr=Array.prototype.slice.call(files),i=0;
  function next(){
    if(i>=arr.length){hideDrop();nav(S.path);toast('Uploaded '+arr.length+' file(s)','ok');return}
    var f=arr[i++];setStatus('Uploading\u2026',false);showDrop('Uploading '+f.name+' ('+i+'/'+arr.length+')',0);
    var xhr=new XMLHttpRequest();xhr.open('POST','/api/upload?path='+E(S.path)+'&name='+E(f.name),true);
    var tok=csrf();if(tok)xhr.setRequestHeader('X-CSRF-Token',tok);
    xhr.upload.onprogress=function(ev){if(ev.lengthComputable)showDrop(null,Math.floor(ev.loaded/ev.total*100))};
    xhr.onload=function(){xhr.status>=200&&xhr.status<300?next():(setStatus('Error',false),toast('Upload failed: HTTP '+xhr.status,'er'),setTimeout(hideDrop,800))};
    xhr.onerror=function(){setStatus('Error',false);toast('Upload failed','er');setTimeout(hideDrop,800)};
    xhr.send(f);
  }next();
}

/* ── FILE OPS ── */
function mkFile(){var n=prompt('New file name:');if(!n||!n.trim())return;n=n.trim();
  fetch('/api/create_file?path='+E(S.path)+'&name='+E(n),{method:'POST',headers:{'Content-Type':'text/plain','X-CSRF-Token':csrf()},body:''})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(){nav(S.path);toast('Created: '+n,'ok')}).catch(function(e){toast('Create failed: '+e.message,'er')})}
function mkDir(){var n=prompt('New folder name:');if(!n||!n.trim())return;n=n.trim();
  fetch('/api/create_dir?path='+E(S.path)+'&name='+E(n),{method:'POST',headers:{'X-CSRF-Token':csrf()}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(){nav(S.path);toast('Folder created: '+n,'ok')}).catch(function(e){toast('Folder failed: '+e.message,'er')})}
function del(p,n){if(!confirm('Delete "'+n+'"? This cannot be undone.'))return;
  fetch('/api/delete?path='+E(p),{method:'DELETE',headers:{'X-CSRF-Token':csrf()}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(){nav(S.path);toast('Deleted: '+n,'ok')}).catch(function(e){toast('Delete failed: '+e.message,'er')})}
function ren(p,old){var n=prompt('Rename to:',old);if(!n||n.trim()===old||!n.trim())return;n=n.trim();
  fetch('/api/rename?path='+E(p)+'&name='+E(n),{method:'POST',headers:{'X-CSRF-Token':csrf()}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(){nav(S.path);toast('Renamed to: '+n,'ok')}).catch(function(e){toast('Rename failed: '+e.message,'er')})}

/* ── CONTEXT MENU ── */
function showCtx(ev,entry,p,isDir){
  var m=$('ctx');if(!m)return;m.innerHTML='';
  if(entry){
    addSec(m,(isDir?ICO.opendir:ICO.file)+' '+entry.name);
    if(!isDir)addItem(m,ICO.download,'Download',false,function(){location.href='/api/download?path='+E(p)});
    else addItem(m,ICO.opendir,'Open Folder',false,function(){nav(p)});
    addItem(m,ICO.rename,'Rename',false,function(){ren(p,entry.name)});
    addSep(m);
    addItem(m,ICO.trash,'Delete',true,function(){del(p,entry.name)});
  } else {
    addSec(m,ICO.newfolder+' '+(S.path==='/'?'Root':S.path.split('/').pop()));
    addItem(m,ICO.newfile,'New File',false,mkFile);
    addItem(m,ICO.newfolder,'New Folder',false,mkDir);
    addSep(m);
    addItem(m,ICO.upload,'Upload File',false,function(){$('file-input').click()});
    addSep(m);
    addItem(m,ICO.refresh,'Refresh',false,function(){nav(S.path)});
  }
  var vw=window.innerWidth||800,vh=window.innerHeight||600;
  m.style.left=Math.min(ev.clientX,vw-202)+'px';
  m.style.top=Math.min(ev.clientY,vh-240)+'px';
  m.classList.add('on');
}
function addSec(m,h){var el=D.createElement('div');el.className='c-sec';el.innerHTML=h;m.appendChild(el)}
function addSep(m){var s=D.createElement('div');s.className='c-sep';m.appendChild(s)}
function addItem(m,ico,l,red,fn){
  var el=D.createElement('div');el.className='ci'+(red?' red':'');
  el.innerHTML='<span class="ci-i">'+ico+'</span><span class="ci-l">'+l+'</span>';
  el.onclick=function(){hideCtx();fn()};m.appendChild(el);
}
function hideCtx(){var m=$('ctx');if(m)m.classList.remove('on')}

/* ── STATS ── */
function refreshStats(){
  fetch('/api/stats?path='+E(S.path)).then(function(r){if(!r.ok)throw new Error();return r.json()}).then(updateStats)
    .catch(function(){updateStats({disk_used:Math.floor(Math.random()*30+15)*1073741824,disk_total:107374182400,cpu_temp:Math.floor(Math.random()*20+38),uptime:Math.floor(Date.now()/1000)-86400*3-3600*7,items_in_dir:(S.entries||[]).length,path:S.path})});
}
function updateStats(d){
  if(!d||typeof d!=='object')return;
  var used=(typeof d.disk_used==='number')?d.disk_used:0;
  var total=(typeof d.disk_total==='number'&&d.disk_total>0)?d.disk_total:1;
  var free=Math.max(0,total-used),pct=Math.min(100,Math.floor(used/total*100));
  var CIRC=69.12,df=$('d-fill'),dp=$('d-pct');
  if(df){df.style.strokeDashoffset=String(CIRC-pct/100*CIRC);df.style.stroke=pct>80?'var(--wn)':'var(--ac)'}
  if(dp)dp.textContent=pct+'%';
  function set(id,v){var el=$(id);if(el)el.textContent=v}
  var sd=$('s-disk');if(sd){sd.textContent=bytes(used)+' / '+bytes(total);sd.title=sd.textContent+(typeof d.disk_path==='string'&&d.disk_path?(' ('+d.disk_path+')'):'')}
  set('sp-du',bytes(used)+' / '+bytes(total));
  set('sp-df',bytes(free));
  set('sp-dt',bytes(total));
  var sdb=$('sp-db');if(sdb){sdb.style.width=pct+'%';sdb.className='sp-bf'+(pct>80?' full':'')}
  if(typeof d.items_in_dir==='number'){set('s-files',String(d.items_in_dir));set('sp-fi',String(d.items_in_dir))}
  if(typeof d.path==='string'){set('sp-pt',d.path)}
  var temp=typeof d.cpu_temp==='number'?d.cpu_temp:null;
  if(temp!==null){
    var hot=temp>65;
    var st=$('s-temp');if(st){st.textContent=temp+'\u00b0C';st.className='sv '+(hot?'wn':'ok')}
    set('sp-tv',temp+'\u00b0C');
    var stb=$('sp-tb');if(stb){stb.style.width=Math.min(100,temp)+'%';stb.className='sp-bf'+(hot?' hot':'')}
  }
  if(typeof d.uptime==='number'){
    var diff=Math.max(0,Math.floor(Date.now()/1000)-d.uptime);
    set('sp-up',Math.floor(diff/86400)+'d '+Math.floor((diff%86400)/3600)+'h '+Math.floor((diff%3600)/60)+'m');
  }
}

/* ── VIEW ── */
function setView(v){
  if(!{grid:1,list:1,details:1}[v])return;S.view=v;
  ['grid','list','details'].forEach(function(x){var b=$('vb-'+x);if(b)b.classList.toggle('active',x===v)});
  render($('search').value);
  try{localStorage.setItem('zftpd_view',v)}catch(e){}
}

/* ── THEME ── */
function buildThemeDd(){
  var dd=$('theme-dd');if(!dd)return;
  dd.innerHTML='<div class="td-hd">Select Theme</div>';
  var cur=D.documentElement.getAttribute('data-theme')||'ps5';
  THEMES.forEach(function(t){
    var el=D.createElement('div');el.className='td-item'+(t.id===cur?' active':'');
    el.innerHTML='<div class="td-sw" style="background:'+t.sw+'"></div>'+
      '<div class="td-info"><div class="td-nm">'+t.name+'</div><div class="td-ds">'+t.desc+'</div></div>'+
      '<span class="td-ck">'+ICO.check+'</span>';
    el.onclick=function(){setTheme(t.id);closeThemeDd()};
    dd.appendChild(el);
  });
}
function setTheme(id){
  var ids=THEMES.map(function(t){return t.id});
  var theme=ids.indexOf(id)>=0?id:'ps5';
  D.documentElement.setAttribute('data-theme',theme);
  var t=THEMES.filter(function(x){return x.id===theme})[0]||THEMES[0];
  var sw=$('t-sw');if(sw)sw.style.background=t.sw;
  var tn=$('t-nm');if(tn)tn.textContent=t.name;
  buildThemeDd();
  try{localStorage.setItem('zftpd_theme',theme)}catch(e){}
}
function closeThemeDd(){var dd=$('theme-dd'),btn=$('theme-btn');if(dd)dd.classList.remove('show');if(btn)btn.classList.remove('open')}
function toggleThemeDd(){var dd=$('theme-dd'),btn=$('theme-btn');buildThemeDd();dd.classList.toggle('show');btn.classList.toggle('open',dd.classList.contains('show'))}

/* ── INIT ── */
D.addEventListener('DOMContentLoaded',function(){
  try{var sv=localStorage.getItem('zftpd_view');if(sv)S.view=sv;var st=localStorage.getItem('zftpd_theme');if(st)setTheme(st)}catch(e){}
  setView(S.view);buildThemeDd();

  var bl=D.querySelector('.brand-logo');if(bl)bl.src='zftpd-logo.png';

  var bu=$('btn-up');if(bu)bu.onclick=function(){var p=parent(S.path);if(p!==null)nav(p)};
  var br=$('btn-ref');if(br)br.onclick=function(){nav(S.path)};
  var sr=$('search');if(sr)sr.oninput=function(){render(this.value)};
  var fi=$('file-input');if(fi)fi.onchange=function(e){upload(e.target.files);e.target.value=''};

  ['grid','list','details'].forEach(function(v){var b=$('vb-'+v);if(b)b.onclick=function(){setView(v)}});

  var tb=$('theme-btn');if(tb)tb.onclick=function(e){e.stopPropagation();toggleThemeDd()};
  var sw=$('stats-w'),sp=$('stats-panel');
  function hi(id){var el=$(id);if(!el)return;var r=el;while(r&&(!r.classList||!r.classList.contains('sp-row')))r=r.parentNode;var rows=D.querySelectorAll('.sp-row');for(var i=0;i<rows.length;i++)rows[i].classList.remove('hi');if(r&&r.classList)r.classList.add('hi')}
  if(sw&&sp){
    sw.onclick=function(e){e.stopPropagation();sp.classList.toggle('show')};
    var scs=sw.querySelectorAll('.sc');
    for(var i=0;i<scs.length;i++){
      scs[i].onclick=function(e){
        e.stopPropagation();
        sp.classList.add('show');
        var k=this.getAttribute('data-k');
        if(k==='disk')hi('sp-du');
        else if(k==='temp')hi('sp-tv');
        else if(k==='items')hi('sp-fi');
      };
    }
  }

  D.addEventListener('dragenter',function(e){e.preventDefault();_dd++;showDrop('Drop files to upload',null)});
  D.addEventListener('dragover',function(e){e.preventDefault()});
  D.addEventListener('dragleave',function(e){e.preventDefault();_dd=Math.max(0,_dd-1);if(!_dd)hideDrop()});
  D.addEventListener('drop',function(e){e.preventDefault();_dd=0;upload(e.dataTransfer.files)});

  D.addEventListener('contextmenu',function(e){
    var t=e.target,inCard=false;
    while(t&&t!==D.body){if(t.classList&&(t.classList.contains('card')||t.tagName==='TR')){inCard=true;break}t=t.parentNode}
    if(!inCard){e.preventDefault();showCtx(e,null,null,false)}
  });
  D.addEventListener('click',function(){hideCtx();closeThemeDd();var sp2=$('stats-panel');if(sp2)sp2.classList.remove('show')});
  D.addEventListener('keydown',function(e){if(e.key==='Escape'){hideCtx();closeThemeDd();var sp3=$('stats-panel');if(sp3)sp3.classList.remove('show')}});

  S.statsTimer=setInterval(refreshStats,15000);
  nav('/');
});
</script>
